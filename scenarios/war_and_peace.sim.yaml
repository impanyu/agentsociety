- to:
  - vasili_kuragin
  - anna_pavlovna_scherer
  - anatole_kuragin
  - hippolyte_kuragin
  kind: system
  content: 别祖霍夫伯爵的葬礼刚刚结束，皮埃尔·别祖霍夫正式成为庞大遗产的唯一继承人。瓦西里·库拉金公爵在别祖霍夫宅邸的书房里连夜写了三封急信：一封送往安娜·帕夫洛夫娜的客厅，请她立刻在沙龙中布置撮合皮埃尔与海伦的温柔陷阱；一封命仆人交给阿纳托利，令他马上停止荒唐的决斗与酗酒，穿戴齐整等候父亲下一步指令；第三封则用外交邮袋火速寄往布伦，严厉催促伊波利特放弃手头闲职，即刻返回彼得堡充当家族的眼线与说客。一场围绕巨额财富的家族密谋悄然启动。
