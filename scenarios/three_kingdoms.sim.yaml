  kind: system
  content: 建安十三年秋，曹操自宛城传檄，令夏侯惇引军十万为先锋，直逼新野。诸葛亮观星推演，知曹军不日将至，速请刘备升帐。议事厅内，诸葛亮指图而言：“曹操挟天子之势，今倾兵南下，新野小城不可固守，当弃之退往樊城，以避其锋。”关羽、张飞闻言，各生思量。
